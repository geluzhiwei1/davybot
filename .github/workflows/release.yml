name: Release to PyPI

# 手动发布到 PyPI（需要人工确认后手动触发）

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0). Leave empty to auto-detect from git tag'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  build-tauri:
    name: Build Tauri (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            arch: 'x86_64'
            os: 'linux'
            exe_name: 'dawei-gui-linux-x86_64'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            arch: 'x86_64'
            os: 'darwin'
            exe_name: 'dawei-gui-darwin-x86_64'
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            arch: 'aarch64'
            os: 'darwin'
            exe_name: 'dawei-gui-darwin-aarch64'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            arch: 'x86_64'
            os: 'windows'
            exe_name: 'dawei-gui-windows-x86_64.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'webui/pnpm-lock.yaml'

      - name: Setup Rust (for Tauri)
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libatk-bridge2.0-dev \
            patchelf \
            p7zip-full

      - name: Verify system dependencies (Ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          echo "Verifying system dependencies..."

          # Check pkg-config
          if ! command -v pkg-config &> /dev/null; then
            echo "ERROR: pkg-config not found"
            exit 1
          fi

          # Check GTK3 and WebKit libraries
          for lib in gtk+-3.0 libsoup-3.0 javascriptcoregtk-4.1; do
            if ! pkg-config --exists $lib 2>/dev/null; then
              echo "ERROR: $lib not found"
              exit 1
            fi
            echo "✅ Found: $lib"
          done

          echo "✅ All system dependencies verified"

      - name: Install frontend dependencies
        working-directory: ./webui
        run: pnpm install --frozen-lockfile

      - name: Prepare drawio resources
        if: runner.os != 'Windows'
        working-directory: ./webui
        run: |
          # Prepare deps directory and clone drawio
          mkdir -p ../deps
          if [ ! -d "../deps/drawio" ]; then
            echo "Cloning drawio repository..."
            git clone https://github.com/geluzhiwei1/drawio.git ../deps/drawio
          fi
          # Run prepare-drawio.sh to copy resources
          bash scripts/prepare-drawio.sh

      - name: Prepare drawio resources (Windows)
        if: runner.os == 'Windows'
        working-directory: ./webui
        shell: bash
        run: |
          # Prepare deps directory and clone drawio
          mkdir -p ../deps
          if [ ! -d "../deps/drawio" ]; then
            echo "Cloning drawio repository..."
            git clone https://github.com/geluzhiwei1/drawio.git ../deps/drawio
          fi
          # Run prepare-drawio.sh to copy resources
          bash scripts/prepare-drawio.sh

      - name: Build frontend
        working-directory: ./webui
        run: pnpm build

      - name: Build Tauri app
        working-directory: ./webui
        run: pnpm tauri build --no-bundle --target ${{ matrix.target }}

      - name: Upload Tauri executable (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-executable-${{ matrix.os }}-${{ matrix.arch }}
          path: webui/src-tauri/target/${{ matrix.target }}/release/dawei-gui
          if-no-files-found: error

      - name: Upload Tauri executable (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-executable-${{ matrix.os }}-${{ matrix.arch }}
          path: webui/src-tauri/target/${{ matrix.target }}/release/dawei-gui.exe
          if-no-files-found: error

  build-wheel:
    name: Build & Publish Wheel
    runs-on: ubuntu-latest
    needs: build-tauri
    environment:
      name: pypi
      url: https://pypi.org/p/davybot

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for setuptools_scm version detection

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'webui/pnpm-lock.yaml'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        working-directory: ./agent
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install build setuptools_scm

      - name: Download all Tauri executables
        uses: actions/download-artifact@v4
        with:
          path: tauri-executables
          pattern: tauri-executable-*
          merge-multiple: false

      - name: Install frontend dependencies
        working-directory: ./webui
        run: pnpm install --frozen-lockfile

      - name: Prepare drawio resources
        working-directory: ./webui
        run: |
          mkdir -p ../deps
          if [ ! -d "../deps/drawio" ]; then
            git clone https://github.com/geluzhiwei1/drawio.git ../deps/drawio
          fi
          bash scripts/prepare-drawio.sh

      - name: Build frontend
        working-directory: ./webui
        run: pnpm build

      - name: Copy frontend to agent
        run: |
          mkdir -p agent/dawei/frontend
          rm -rf agent/dawei/frontend/*
          cp -r webui/src-tauri/resources/* agent/dawei/frontend/
          # Ensure welcome.html is included
          if [ -f "webui/src-tauri/resources/welcome.html" ]; then
            cp webui/src-tauri/resources/welcome.html agent/dawei/frontend/
          fi

      - name: Copy Tauri executables to agent
        run: |
          mkdir -p agent/dawei/bin

          # Copy each platform executable with explicit error checking
          if [ -f "tauri-executables/tauri-executable-linux-x86_64/dawei-gui" ]; then
            cp tauri-executables/tauri-executable-linux-x86_64/dawei-gui \
               agent/dawei/bin/dawei-gui-linux-x86_64
            chmod +x agent/dawei/bin/dawei-gui-linux-x86_64
          else
            echo "ERROR: Linux x86_64 executable not found"
            exit 1
          fi

          if [ -f "tauri-executables/tauri-executable-darwin-x86_64/dawei-gui" ]; then
            cp tauri-executables/tauri-executable-darwin-x86_64/dawei-gui \
               agent/dawei/bin/dawei-gui-darwin-x86_64
            chmod +x agent/dawei/bin/dawei-gui-darwin-x86_64
          else
            echo "ERROR: macOS x86_64 executable not found"
            exit 1
          fi

          if [ -f "tauri-executables/tauri-executable-darwin-aarch64/dawei-gui" ]; then
            cp tauri-executables/tauri-executable-darwin-aarch64/dawei-gui \
               agent/dawei/bin/dawei-gui-darwin-aarch64
            chmod +x agent/dawei/bin/dawei-gui-darwin-aarch64
          else
            echo "ERROR: macOS aarch64 executable not found"
            exit 1
          fi

          if [ -f "tauri-executables/tauri-executable-windows-x86_64/dawei-gui.exe" ]; then
            cp tauri-executables/tauri-executable-windows-x86_64/dawei-gui.exe \
               agent/dawei/bin/dawei-gui-windows-x86_64.exe
          else
            echo "ERROR: Windows x86_64 executable not found"
            exit 1
          fi

          ls -la agent/dawei/bin/

      - name: Verify all files are present
        run: |
          echo "Verifying package structure..."

          # Check frontend
          if [ ! -f "agent/dawei/frontend/index.html" ]; then
            echo "ERROR: frontend/index.html not found"
            exit 1
          fi

          # Check bin directory
          EXPECTED_BINS=(
            "dawei-gui-linux-x86_64"
            "dawei-gui-darwin-x86_64"
            "dawei-gui-darwin-aarch64"
            "dawei-gui-windows-x86_64.exe"
          )

          for bin in "${EXPECTED_BINS[@]}"; do
            if [ ! -f "agent/dawei/bin/$bin" ]; then
              echo "ERROR: bin/$bin not found"
              exit 1
            fi
            echo "✅ Found: $bin ($(du -h agent/dawei/bin/$bin | cut -f1))"
          done

          echo "✅ All files verified successfully"

      - name: Get version from setuptools_scm
        id: version
        run: |
          # If manual version input is provided, use it directly
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Using manual version: ${VERSION}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "use_manual=true" >> $GITHUB_OUTPUT
          else
            # Auto-detect version from setuptools_scm
            cd agent
            VERSION=$(python3 -c "from setuptools_scm import get_version; print(get_version(root='..', relative_to='pyproject.toml'))")
            echo "Detected version: ${VERSION}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "use_manual=false" >> $GITHUB_OUTPUT

            # Validate version format (should not contain git hash like +g7093f5e57)
            if [[ "$VERSION" =~ \+g[0-9a-f]+ ]]; then
              echo "ERROR: Version contains git hash which is not PyPI compatible: $VERSION"
              echo "The local_scheme = 'no-local-version' setting should prevent this"
              exit 1
            fi
          fi

      - name: Copy README to agent directory
        run: |
          # Copy README.md to agent directory for PyPI long_description
          cp README.md agent/README.md
          cp README_CN.md agent/README_CN.md

      - name: Build wheel
        working-directory: ./agent
        run: |
          rm -rf dist/ build/ *.egg-info
          # If manual version is provided, use SETUPTOOLS_SCM_PRETEND_VERSION to override
          if [ "${{ steps.version.outputs.use_manual }}" = "true" ]; then
            export SETUPTOOLS_SCM_PRETEND_VERSION_FOR_DAVYBOT="${{ steps.version.outputs.version }}"
            echo "Building with manual version: ${{ steps.version.outputs.version }}"
          else
            echo "Building with auto-detected version from setuptools_scm"
          fi
          python3 -m build

      - name: Verify wheel package contents
        working-directory: ./agent
        run: |
          echo "Verifying wheel package contents..."

          # Check if wheel was created
          WHEEL_FILE=$(ls dist/*.whl | head -1)
          if [ -z "$WHEEL_FILE" ]; then
            echo "ERROR: No wheel file found"
            exit 1
          fi

          echo "Found wheel: $WHEEL_FILE"

          # Verify wheel contains GUI executables
          python3 - <<EOF
          import zipfile
          import sys

          wheel_path = "$WHEEL_FILE"
          expected_bins = [
              "dawei/bin/dawei-gui-linux-x86_64",
              "dawei/bin/dawei-gui-darwin-x86_64",
              "dawei/bin/dawei-gui-darwin-aarch64",
              "dawei/bin/dawei-gui-windows-x86_64.exe",
          ]

          with zipfile.ZipFile(wheel_path, 'r') as zf:
              files = zf.namelist()

              # Check GUI executables
              for bin_file in expected_bins:
                  if bin_file in files:
                      info = zf.getinfo(bin_file)
                      size_mb = info.file_size / 1024 / 1024
                      print(f"✅ Found: {bin_file} ({size_mb:.1f} MB)")
                  else:
                      print(f"❌ Missing: {bin_file}")
                      sys.exit(1)

              # Check frontend
              if "dawei/frontend/index.html" in files:
                  print("✅ Found: dawei/frontend/index.html")
              else:
                  print("❌ Missing: dawei/frontend/index.html")
                  sys.exit(1)

          print("✅ Wheel package verification passed")
          EOF

          echo "✅ Wheel package is valid"

      - name: Check wheel size
        working-directory: ./agent
        run: |
          WHEEL_FILE=$(ls dist/*.whl | head -1)
          WHEEL_SIZE=$(du -m "$WHEEL_FILE" | cut -f1)

          echo "Wheel size: ${WHEEL_SIZE} MB"

          # Wheel should be around 100-120 MB (包含所有平台的 GUI)
          if [ "$WHEEL_SIZE" -lt 80 ]; then
            echo "WARNING: Wheel size seems too small (expected ~100 MB)"
            echo "This might indicate that GUI executables are missing"
          elif [ "$WHEEL_SIZE" -gt 200 ]; then
            echo "WARNING: Wheel size seems too large (expected ~100 MB)"
          else
            echo "✅ Wheel size is within expected range"
          fi

      - name: Copy wheel to root dist
        run: |
          mkdir -p dist
          cp -r agent/dist/* dist/

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ steps.version.outputs.version }}
          path: dist/
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Wheel Size**: $(du -m agent/dist/*.whl | cut -f1) MB" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms**:" >> $GITHUB_STEP_SUMMARY
          echo "  - Linux x86_64: ✅" >> $GITHUB_STEP_SUMMARY
          echo "  - macOS x86_64: ✅" >> $GITHUB_STEP_SUMMARY
          echo "  - macOS aarch64: ✅" >> $GITHUB_STEP_SUMMARY
          echo "  - Windows x86_64: ✅" >> $GITHUB_STEP_SUMMARY

      # - name: Publish distribution to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     password: ${{ secrets.PYPI_API_TOKEN }}
      #     packages-dir: agent/dist/
      #     skip-existing: false

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-tauri, build-wheel]
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: '*'
          merge-multiple: false

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheel-*
          path: dist
          merge-multiple: true

      - name: Verify wheel files exist
        run: |
          echo "Verifying distribution files..."
          ls -la dist/

          # Check if wheel exists
          if [ ! -f "dist/*.whl" ]; then
            echo "ERROR: No wheel file found in dist/"
            ls -la dist/
            exit 1
          fi

          WHEEL_FILE=$(ls dist/*.whl | head -1)
          echo "✅ Found wheel: $WHEEL_FILE"
          echo "Wheel size: $(du -h "$WHEEL_FILE" | cut -f1)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get version from setuptools_scm
        id: version
        run: |
          # If manual version input is provided, use it directly
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Auto-detect version from setuptools_scm
            cd agent
            VERSION=$(python3 -c "from setuptools_scm import get_version; print(get_version(root='..', relative_to='pyproject.toml'))")
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Create release with all artifacts
          gh release create '${{ steps.version.outputs.version }}' \
            --repo '${{ github.repository }}' \
            --title "Release ${{ steps.version.outputs.version }}" \
            --notes "## Release ${{ steps.version.outputs.version }}

          ### Changes
          - Full Python backend with FastAPI
          - Vue 3 frontend with Element Plus
          - Tauri desktop GUI for all platforms:
            - Linux x86_64
            - macOS x86_64 (Intel)
            - macOS aarch64 (Apple Silicon)
            - Windows x86_64

          ### Installation
          \`\`\`bash
          pip install davybot==${{ steps.version.outputs.version }}
          dawei gui  # Launch desktop GUI
          \`\`\`

          ### Verification
          - ✅ All platform GUI executables included
          - ✅ Frontend resources bundled
          - ✅ Wheel size: $(du -h agent/dist/*.whl 2>/dev/null | cut -f1 || echo "N/A")
          " \
            dist/*.whl \
            dist/*.tar.gz

      - name: Release summary
        run: |
          echo "## 🎉 Release Created Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published to:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ [PyPI](https://pypi.org/p/davybot)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Included Platforms:" >> $GITHUB_STEP_SUMMARY
          echo "- Linux x86_64" >> $GITHUB_STEP_SUMMARY
          echo "- macOS x86_64 (Intel)" >> $GITHUB_STEP_SUMMARY
          echo "- macOS aarch64 (Apple Silicon)" >> $GITHUB_STEP_SUMMARY
          echo "- Windows x86_64" >> $GITHUB_STEP_SUMMARY
