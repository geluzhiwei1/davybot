name: Build Tauri Standalone

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version (optional)'
        required: false
        type: string
      create_release:
        description: 'Create GitHub release (only for manual trigger)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--config src-tauri/tauri.conf.standalone.json'
            target: 'x86_64-apple-darwin'
            arch: 'x86_64'
            timeout: 120
          - platform: 'macos-latest'
            args: '--config src-tauri/tauri.conf.standalone.json'
            target: 'aarch64-apple-darwin'
            arch: 'aarch64'
            timeout: 120
          - platform: 'ubuntu-22.04'
            args: '--config src-tauri/tauri.conf.standalone.json'
            target: 'x86_64-unknown-linux-gnu'
            arch: 'x86_64'
            timeout: 180
          - platform: 'windows-latest'
            args: '--config src-tauri/tauri.conf.standalone.json'
            target: 'x86_64-pc-windows-msvc'
            arch: 'x86_64'
            timeout: 180

    runs-on: ${{ matrix.platform }}
    timeout-minutes: ${{ matrix.timeout }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ========== Determine version ==========
      - name: Set version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            # Remove leading 'v' if present to avoid double 'v' prefix
            VERSION=${VERSION#v}
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(grep '^version' webui/src-tauri/Cargo.toml | head -1 | awk -F '"' '{print $2}')
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"
        shell: bash

      # ========== Setup Node.js & pnpm ==========
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'webui/pnpm-lock.yaml'

      # ========== Setup Rust (for Tauri) ==========
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets (macOS)
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      # ========== Setup Python (for standalone) ==========
      # NOTE: For macOS, we use Homebrew Python instead of actions/setup-python
      # because:
      #   - actions/setup-python installs framework Python with Python.app
      #   - Python.app contains hardcoded paths that break in portable builds
      #   - Homebrew Python is a standalone binary without Python.app
      # For Linux/Windows, actions/setup-python works fine
      - name: Setup Python (Linux/Windows)
        if: startsWith(matrix.platform, 'ubuntu') || startsWith(matrix.platform, 'windows')
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ========== Platform-specific setup ==========
      - name: Install dependencies (Ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf p7zip-full

      - name: Install dependencies (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          # Install Homebrew Python (standalone, no Python.app)
          # This is CRITICAL for portable builds
          echo "Installing Homebrew Python 3.12..."
          brew install python@3.12

          # Verify it's a standalone build
          PYTHON_BIN="$(brew --prefix)/bin/python3"
          echo "Python binary: $PYTHON_BIN"
          file "$PYTHON_BIN"

          # Check it's not a framework build
          if "$PYTHON_BIN" -c "import sys; print('Framework:', getattr(sys, 'framework', 'None'))" | grep -q "Framework: None"; then
            echo "✓ Homebrew Python is standalone (not framework)"
          else
            echo "⚠️  Warning: Python might be a framework build"
          fi

          # Add to PATH for subsequent steps
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH

          # Set Python_ROOT_DIR for our venv creation script
          echo "PYTHON_ROOT_DIR=$(brew --prefix)" >> $GITHUB_ENV
          echo "PYTHON_BIN=$(brew --prefix)/bin/python3" >> $GITHUB_ENV

          brew install openssl@3

      # ========== Cache dependencies ==========
      # 使用业界最佳实践：swatinem/rust-cache
      # 自动处理所有 Rust 缓存路径，优化缓存键，支持工作空间
      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: webui/src-tauri
          key: ${{ matrix.target }}-${{ hashFiles('webui/src-tauri/Cargo.lock') }}
          cache-on-failure: true

      - name: Cache Python venv
        uses: actions/cache@v4
        with:
          path: agent/.venv
          key: ${{ runner.os }}-${{ matrix.target }}-python-venv-${{ hashFiles('agent/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-python-venv-
            ${{ runner.os }}-python-venv-

      # ========== Install frontend dependencies ==========
      - name: Install pnpm dependencies
        working-directory: ./webui
        run: pnpm install --frozen-lockfile

      # ========== Prepare Python environment ==========
      - name: Install UV package manager
        run: |
          # Install UV using pip (works on all platforms)
          # NOTE: On macOS, we use Homebrew Python's pip3
          # On Linux/Windows, we use the system Python from actions/setup-python
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            # Use Homebrew Python's pip3
            # Homebrew Python uses PEP 668 (externally-managed-environment)
            # We need to use --break-system-packages since we're in CI
            "$(brew --prefix)/bin/pip3" install uv --quiet --break-system-packages
          else
            # Use system pip3
            pip3 install uv --quiet
          fi
        shell: bash

      - name: Create Python venv if cache miss
        run: |
          cd agent
          if [ ! -d ".venv" ]; then
            # Create venv using Python's standard venv module (more reliable for standalone)
            # UV's venv creates trampolines that break in standalone environments
            # IMPORTANT: Always use `python -m venv`, never `uv venv`:
            #   - `uv venv` does NOT copy the python binary (only symlinks), which break when copied
            #   - `python -m venv` copies the real python binary, making it truly portable

            # On macOS, use Homebrew Python (standalone, no Python.app)
            # Homebrew Python is installed in the "Install dependencies (macOS only)" step
            # System Python and actions/setup-python use frameworks with Python.app
            if [[ "$RUNNER_OS" == "macOS" ]]; then
              echo "macOS detected: using Homebrew Python for portable venv"

              # Check if Homebrew Python is available
              if [[ -n "$PYTHON_BIN" ]] && [[ -f "$PYTHON_BIN" ]]; then
                echo "Using Homebrew Python: $PYTHON_BIN"
                PYTHON_EXE="$PYTHON_BIN"
              elif command -v brew &> /dev/null; then
                PYTHON_EXE="$(brew --prefix)/bin/python3"
                echo "Using Homebrew Python from brew prefix: $PYTHON_EXE"
              else
                echo "❌ ERROR: Homebrew Python not found"
                echo "Please ensure 'brew install python@3.12' was run"
                exit 1
              fi

              # Verify it's a standalone build (not framework)
              PYTHON_TYPE=$("$PYTHON_EXE" -c "import sys; print('framework' if hasattr(sys, 'framework') and sys.framework else 'standalone')")
              echo "Python build type: $PYTHON_TYPE"

              if [[ "$PYTHON_TYPE" == "framework" ]]; then
                echo "⚠️  Warning: Python is a framework build, may not be fully portable"
              else
                echo "✓ Python is standalone build (good for portability)"
              fi

              # Create venv with --symlinks=false to copy binary
              # Homebrew Python doesn't have Python.app, so no need to remove it
              "$PYTHON_EXE" -m venv --symlinks=false .venv
              echo "✓ Created venv with Homebrew Python"
            elif [[ "$RUNNER_OS" == "Windows" ]]; then
              echo "Windows detected: using python3 for venv"
              python3 -m venv .venv
            else
              echo "Linux detected: using python3 for venv"
              python3 -m venv .venv
            fi

            # Install project dependencies (non-editable install is required for portable packaging)
            # IMPORTANT: Use `pip install .` (NOT `-e .`):
            #   - `-e .` (editable) embeds the CI source path in .pth files, breaking on user machines
            #   - `.` (regular) copies the package into site-packages, making it truly portable
            if [[ "$RUNNER_OS" == "Windows" ]]; then
              echo "Windows detected: using pip for installation"
              .venv/Scripts/python.exe -m pip install --upgrade pip
              .venv/Scripts/python.exe -m pip install .
            else
              echo "Unix detected: using pip for installation"
              .venv/bin/python -m pip install --upgrade pip
              .venv/bin/python -m pip install .
            fi

            # Verify dawei command is available
            if [[ "$RUNNER_OS" == "Windows" ]]; then
              # On Windows, check for dawei.exe in Scripts
              if [ -f ".venv/Scripts/dawei.exe" ]; then
                echo "✓ dawei.exe found in Scripts directory"
                .venv/Scripts/dawei.exe --version || echo "Version check failed"
              else
                echo "❌ ERROR: dawei.exe not found in Scripts directory"
                echo "Contents of Scripts directory:"
                ls -la .venv/Scripts/ | head -20
                exit 1
              fi
            else
              # On Unix, check for dawei in bin
              if [ -f ".venv/bin/dawei" ]; then
                echo "✓ dawei found in bin directory"
                .venv/bin/dawei --version || echo "Version check failed"
              else
                echo "❌ ERROR: dawei not found in bin directory"
                echo "Contents of bin directory:"
                ls -la .venv/bin/ | head -20
                exit 1
              fi
            fi
          else
            # Cache hit: recreate venv to ensure clean state
            # (cached venv may have been created by `uv venv` with symlinked python, not portable)
            echo "Cache hit: recreating venv to ensure portability"
            rm -rf .venv

            if [[ "$RUNNER_OS" == "macOS" ]]; then
              echo "macOS detected: using Homebrew Python"

              # Same logic as above for cache miss
              if [[ -n "$PYTHON_BIN" ]] && [[ -f "$PYTHON_BIN" ]]; then
                PYTHON_EXE="$PYTHON_BIN"
              elif command -v brew &> /dev/null; then
                PYTHON_EXE="$(brew --prefix)/bin/python3"
              else
                echo "❌ ERROR: Homebrew Python not found"
                exit 1
              fi

              "$PYTHON_EXE" -m venv --symlinks=false .venv
              echo "✓ Recreated venv with Homebrew Python"
            elif [[ "$RUNNER_OS" == "Windows" ]]; then
              python3 -m venv .venv
            else
              python3 -m venv .venv
            fi

            if [[ "$RUNNER_OS" == "Windows" ]]; then
              .venv/Scripts/python.exe -m pip install --upgrade pip
              .venv/Scripts/python.exe -m pip install .
            else
              .venv/bin/python -m pip install --upgrade pip
              .venv/bin/python -m pip install .
            fi

            # Verify dawei command is available
            if [[ "$RUNNER_OS" == "Windows" ]]; then
              if [ -f ".venv/Scripts/dawei.exe" ]; then
                echo "✓ dawei.exe found in Scripts directory"
              else
                echo "❌ ERROR: dawei.exe not found after recreate"
                exit 1
              fi
            else
              if [ -f ".venv/bin/dawei" ]; then
                echo "✓ dawei found in bin directory"
              else
                echo "❌ ERROR: dawei not found after recreate"
                exit 1
              fi
            fi
          fi
        shell: bash

      # NOTE: Python environment will be copied AFTER Tauri build to avoid symlink validation errors

      # ========== Prepare drawio resources ==========
      - name: Prepare drawio resources
        working-directory: ./webui
        run: bash scripts/prepare-drawio.sh

      # ========== Build frontend ==========
      - name: Build frontend
        working-directory: ./webui
        run: pnpm build

      # ========== Build Tauri app (no bundle) ==========
      - name: Build Tauri app (macOS)
        if: startsWith(matrix.platform, 'macos')
        working-directory: ./webui
        shell: bash
        run: |
          # For macOS, build for the specific architecture
          echo "Building for ${{ matrix.target }}..."
          pnpm tauri build --config src-tauri/tauri.conf.standalone.json --no-bundle --target ${{ matrix.target }} --features standalone
          echo "Build completed successfully"
          ls -la src-tauri/target/${{ matrix.target }}/release/dawei-gui

      - name: Copy Python environment to Tauri resources (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          mkdir -p webui/src-tauri/resources
          rm -rf webui/src-tauri/resources/python-env
          cp -r agent/.venv webui/src-tauri/resources/python-env

          # Clean up Python cache to reduce size
          find webui/src-tauri/resources/python-env -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find webui/src-tauri/resources/python-env -name "*.pyc" -delete 2>/dev/null || true

          # Fix shebangs: rewrite hardcoded CI paths to use /usr/bin/env python3
          # Entry-point scripts have shebangs like #!/home/runner/.../bin/python3 which
          # don't exist on user machines. Rewrite to /usr/bin/env python3.
          # The Rust startup code prepends venv bin/ to PATH, so env resolves to bundled python3.
          echo "=== Fixing shebangs in python-env/bin/ ==="
          PYENV="webui/src-tauri/resources/python-env"
          find "$PYENV/bin" -maxdepth 1 -type f | while read script; do
            if head -1 "$script" 2>/dev/null | grep -q "^#!.*python"; then
              sed -i '' "1s|^#!.*|#!/usr/bin/env python3|" "$script"
              echo "  Fixed shebang: $(basename "$script")"
            fi
          done

          # Ensure python -> python3 symlink exists (Rust code uses bin/python)
          if [ ! -e "$PYENV/bin/python" ]; then
            echo "Creating python -> python3 symlink"
            ln -s python3 "$PYENV/bin/python"
          fi

          # Verify dawei command exists in copied environment
          echo "=== Verifying dawei command in resources/python-env ==="
          if [ -f "$PYENV/bin/dawei" ]; then
            echo "✓ dawei found in resources/python-env/bin/"
            "$PYENV/bin/python3" -c "from dawei.cli.dawei import main; print('dawei import OK')"
          else
            echo "❌ ERROR: dawei not found in resources/python-env/bin/"
            ls -la "$PYENV/bin/" | head -20
            exit 1
          fi
        shell: bash

      - name: Fix Python dynamic library linking (macOS only)
        if: startsWith(matrix.platform, 'macos')
        run: |
          echo "=== Checking if Python needs dynamic library fixing ==="
          PYENV="webui/src-tauri/resources/python-env"

          # Check if Python binary references any framework or has hardcoded paths
          PYTHON_DEPS=$(otool -L "$PYENV/bin/python" | grep -v "/usr/lib" | grep -v "/System/Library" || true)

          if [ -n "$PYTHON_DEPS" ]; then
            echo "Python has non-system dependencies, running fix script..."
            echo "Dependencies:"
            echo "$PYTHON_DEPS"
            bash scripts/fix-macos-python-venv.sh "$PYENV"
          else
            echo "✓ Python binary appears to be standalone (no framework dependencies)"
            echo "Skipping fix script - Homebrew Python is already portable"
          fi

          echo "=== Verifying Python binary after fix/check ==="
          "$PYENV/bin/python" --version
        shell: bash

      - name: Copy macOS binaries to simple path
        if: startsWith(matrix.platform, 'macos')
        run: |
          mkdir -p macos-binaries
          cp webui/src-tauri/target/${{ matrix.target }}/release/dawei-gui macos-binaries/dawei-gui-${{ matrix.arch }}
          ls -la macos-binaries/

      - name: Create portable ZIP package (macOS)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_NAME="dawei-gui"
          ARCH="${{ matrix.arch }}"
          ZIP_DIR="webui/src-tauri/target/${{ matrix.target }}/release/${APP_NAME}-standalone-darwin-${ARCH}-portable-v${VERSION}"
          ZIP_NAME="${APP_NAME}-standalone-darwin-${ARCH}-portable-v${VERSION}.zip"

          # Create package directory
          mkdir -p "${ZIP_DIR}/resources"

          # Copy main executable
          cp "webui/src-tauri/target/${{ matrix.target }}/release/${APP_NAME}" "${ZIP_DIR}/"

          # Copy Python environment
          cp -r webui/src-tauri/resources/python-env "${ZIP_DIR}/resources/"

          # Copy drawio (diagram editor)
          cp -r webui/src-tauri/resources/drawio "${ZIP_DIR}/resources/"

          # Copy welcome.html
          cp webui/src-tauri/resources/welcome.html "${ZIP_DIR}/resources/"

          # Create README
          cat > "${ZIP_DIR}/README.txt" << EOF
          # Dawei AI Assistant - Standalone Portable Version

          Version: \${VERSION}
          Architecture: ${ARCH}

          ## Usage

          1. Extract this ZIP file to any directory
          2. Run ./dawei-gui to launch the application

          The application will automatically start the backend service on first launch.

          ## Directory Structure

          - dawei-gui                : Main application (${ARCH} binary)
          - resources/               : Resource files directory
            - welcome.html           : Welcome page (standalone HTML)
            - drawio/                : Draw.io diagram editor (148 MB)
            - python-env/            : Python runtime environment
              - bin/python           : Python interpreter
              - bin/uv               : UV package manager
              - bin/pip              : Python package manager
              - lib/                 : Python standard library
              - lib/site-packages/   : Third-party libraries (FastAPI, uvicorn, etc.)

          ## System Requirements

          - macOS ${ARCH} ($(if [ "${ARCH}" = "x86_64" ]; then echo 'Intel/AMD 64-bit'; else echo 'Apple Silicon (ARM64)'; fi))
          - About 500 MB free disk space

          ## Notes

          - First launch may take a few seconds to initialize
          - Make the script executable: chmod +x dawei-gui
          - Do not move or delete the resources directory
          - If you encounter issues, check the application logs

          ## Support

          Project Homepage: https://github.com/dawei/patent-agent

          Copyright (c) 2026 Dawei Team. All rights reserved.
          EOF

          # Create ZIP
          cd "webui/src-tauri/target/${{ matrix.target }}/release"
          # Use relative path since we're already in the release directory
          ZIP_DIR_BASE=$(basename "${ZIP_DIR}")
          zip -qr "${ZIP_NAME}" "${ZIP_DIR_BASE}"

          echo "Created ZIP: ${ZIP_NAME}"
          ls -la "${ZIP_NAME}"

      - name: Build Tauri app (Linux x86_64)
        if: matrix.platform == 'ubuntu-latest' && matrix.arch == 'x86_64'
        working-directory: ./webui
        run: |
          # For Linux x86_64, build for the specific architecture
          echo "Building for ${{ matrix.target }}..."
          pnpm tauri build --config src-tauri/tauri.conf.standalone.json --no-bundle --target ${{ matrix.target }} --features standalone
          echo "Build completed successfully"
          ls -la src-tauri/target/${{ matrix.target }}/release/dawei-gui || ls -la src-tauri/target/release/dawei-gui

      - name: Copy Python environment to Tauri resources (Linux)
        if: matrix.platform == 'ubuntu-latest' && matrix.arch == 'x86_64'
        run: |
          mkdir -p webui/src-tauri/resources
          rm -rf webui/src-tauri/resources/python-env
          cp -r agent/.venv webui/src-tauri/resources/python-env

          # Clean up Python cache to reduce size
          find webui/src-tauri/resources/python-env -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find webui/src-tauri/resources/python-env -name "*.pyc" -delete 2>/dev/null || true

          # Verify python binary exists (real file, not broken symlink from uv venv)
          echo "=== Verifying python binary in resources/python-env ==="
          PYENV="webui/src-tauri/resources/python-env"
          if [ -f "$PYENV/bin/python3" ]; then
            echo "✓ python3 found (real binary)"
            "$PYENV/bin/python3" --version
          else
            echo "❌ ERROR: python3 not found in $PYENV/bin/ - venv may have been created by 'uv venv' (no python binary)"
            echo "Contents of bin directory:"
            ls -la "$PYENV/bin/" | head -20
            exit 1
          fi

          # Ensure python -> python3 symlink exists (Rust code uses bin/python)
          if [ ! -e "$PYENV/bin/python" ]; then
            echo "Creating python -> python3 symlink"
            ln -s python3 "$PYENV/bin/python"
          fi

          # Fix shebangs: rewrite hardcoded CI paths to use /usr/bin/env python3
          # Entry-point scripts have shebangs like #!/home/runner/.../bin/python3 which
          # don't exist on user machines. Rewrite to /usr/bin/env python3.
          # The Rust startup code prepends venv bin/ to PATH, so env resolves to bundled python3.
          echo "=== Fixing shebangs in python-env/bin/ ==="
          find "$PYENV/bin" -maxdepth 1 -type f -executable | while read script; do
            if head -1 "$script" 2>/dev/null | grep -q "^#!.*python"; then
              sed -i "1s|^#!.*|#!/usr/bin/env python3|" "$script"
              echo "  Fixed shebang: $(basename "$script")"
            fi
          done

          # Verify dawei command exists in copied environment
          echo "=== Verifying dawei command in resources/python-env ==="
          if [ -f "$PYENV/bin/dawei" ]; then
            echo "✓ dawei found in resources/python-env/bin/"
            "$PYENV/bin/python3" -c "from dawei.cli.dawei import main; print('dawei import OK')"
          else
            echo "❌ ERROR: dawei not found in resources/python-env/bin/"
            ls -la "$PYENV/bin/" | head -20
            exit 1
          fi
        shell: bash

      - name: Build Tauri app (Windows)
        if: startsWith(matrix.platform, 'windows')
        working-directory: ./webui
        shell: bash
        run: |
          # For Windows, build for the specific architecture
          echo "Building for ${{ matrix.target }}..."
          pnpm tauri build --config src-tauri/tauri.conf.standalone.json --no-bundle --target ${{ matrix.target }} --features standalone
          echo "Build completed successfully"
          ls -la src-tauri/target/${{ matrix.target }}/release/dawei-gui.exe || ls -la src-tauri/target/release/dawei-gui.exe || true

      - name: Copy Python environment to Tauri resources (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        run: |
          mkdir -p webui/src-tauri/resources
          rm -rf webui/src-tauri/resources/python-env
          cp -r agent/.venv webui/src-tauri/resources/python-env

          # Clean up Python cache to reduce size
          find webui/src-tauri/resources/python-env -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find webui/src-tauri/resources/python-env -name "*.pyc" -delete 2>/dev/null || true

          # Verify dawei command exists in copied environment
          echo "=== Verifying dawei command in resources/python-env ==="
          if [ -f "webui/src-tauri/resources/python-env/Scripts/dawei.exe" ]; then
            echo "✓ dawei.exe found in resources/python-env/Scripts/"
            webui/src-tauri/resources/python-env/Scripts/dawei.exe --version || echo "Version check failed"
          else
            echo "❌ ERROR: dawei.exe not found in resources/python-env/Scripts/"
            echo "Contents of Scripts directory:"
            ls -la webui/src-tauri/resources/python-env/Scripts/ | head -20
            exit 1
          fi

      # ========== Create portable ZIP packages ==========
      - name: Create portable ZIP package (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_NAME="dawei-gui"
          TARGET="${{ matrix.target }}"
          ZIP_DIR="webui/src-tauri/target/${TARGET}/release/${APP_NAME}-standalone-win-portable-v${VERSION}"
          ZIP_NAME="${APP_NAME}-standalone-win-portable-v${VERSION}.zip"

          # Create package directory
          mkdir -p "${ZIP_DIR}/resources"

          # Copy main executable
          cp "webui/src-tauri/target/${TARGET}/release/${APP_NAME}.exe" "${ZIP_DIR}/"

          # Copy Python environment
          cp -r webui/src-tauri/resources/python-env "${ZIP_DIR}/resources/"

          # Copy drawio (diagram editor)
          cp -r webui/src-tauri/resources/drawio "${ZIP_DIR}/resources/"

          # Copy welcome.html
          cp webui/src-tauri/resources/welcome.html "${ZIP_DIR}/resources/"

          # Create README
          cat > "${ZIP_DIR}/README.txt" << EOF
          # Dawei AI Assistant - Standalone Portable Version

          Version: \${VERSION}

          ## Usage

          1. Extract this ZIP file to any directory
          2. Double-click dawei-gui.exe to launch the application

          The application will automatically start the backend service on first launch.

          ## Directory Structure

          - dawei-gui.exe            : Main application
          - resources/               : Resource files directory
            - welcome.html           : Welcome page (standalone HTML)
            - drawio/                : Draw.io diagram editor (148 MB)
            - python-env/            : Python runtime environment (Windows venv)
              - Scripts/python.exe   : Python interpreter
              - Scripts/uv.exe       : UV package manager
              - Scripts/pip.exe      : Python package manager
              - Lib/                 : Python standard library
              - Lib/site-packages/   : Third-party libraries (FastAPI, uvicorn, etc.)

          ## System Requirements

          - Windows 10 or higher (64-bit)
          - About 500 MB free disk space

          ## Notes

          - First launch may take a few seconds to initialize
          - The backend service is automatically managed by the application
          - Do not move or delete the resources directory
          - If you encounter issues, check the application logs
          - The application uses UV to run dawei server commands

          ## Support

          Project Homepage: https://github.com/dawei/patent-agent

          Copyright (c) 2026 Dawei Team. All rights reserved.
          EOF

          # Create ZIP
          cd "webui/src-tauri/target/${TARGET}/release"
          # Use relative path since we're already in the release directory
          7z a -tzip "${ZIP_NAME}" "$(basename "${ZIP_DIR}")" -mx=9

          echo "Created ZIP: ${ZIP_NAME}"
          ls -la "${ZIP_NAME}"

      - name: Create portable ZIP package (Linux x86_64)
        if: matrix.platform == 'ubuntu-latest' && matrix.arch == 'x86_64'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_NAME="dawei-gui"
          ARCH="${{ matrix.arch }}"
          ZIP_DIR="webui/src-tauri/target/${{ matrix.target }}/release/${APP_NAME}-standalone-linux-${ARCH}-portable-v${VERSION}"
          ZIP_NAME="${APP_NAME}-standalone-linux-${ARCH}-portable-v${VERSION}.zip"

          # Create package directory
          mkdir -p "${ZIP_DIR}/resources"

          # Copy main executable from the correct target directory
          cp "webui/src-tauri/target/${{ matrix.target }}/release/${APP_NAME}" "${ZIP_DIR}/"

          # Copy Python environment
          cp -r webui/src-tauri/resources/python-env "${ZIP_DIR}/resources/"

          # Copy drawio (diagram editor)
          cp -r webui/src-tauri/resources/drawio "${ZIP_DIR}/resources/"

          # Copy welcome.html
          cp webui/src-tauri/resources/welcome.html "${ZIP_DIR}/resources/"

          # Create README
          cat > "${ZIP_DIR}/README.txt" << EOF
          # Dawei AI Assistant - Standalone Portable Version

          Version: \${VERSION}
          Architecture: ${ARCH}

          ## Usage

          1. Extract this ZIP file to any directory
          2. Run ./dawei-gui to launch the application

          The application will automatically start the backend service on first launch.

          ## Directory Structure

          - dawei-gui                : Main application (${ARCH} binary)
          - resources/               : Resource files directory
            - welcome.html           : Welcome page (standalone HTML)
            - drawio/                : Draw.io diagram editor (148 MB)
            - python-env/            : Python runtime environment
              - bin/python           : Python interpreter
              - bin/uv               : UV package manager
              - bin/pip              : Python package manager
              - lib/                 : Python standard library
              - lib/site-packages/   : Third-party libraries (FastAPI, uvicorn, etc.)

          ## System Requirements

          - Linux x86_64 (Intel/AMD 64-bit)
          - GLIBC 2.35 or higher (Ubuntu 22.04+, Debian 12+, RHEL 9+, or equivalent)
          - About 500 MB free disk space

          **Note**: This build requires GLIBC 2.35+. If you're on an older system (Ubuntu 20.04 or earlier), please upgrade your OS or use our source distribution.

          ## Notes

          - First launch may take a few seconds to initialize
          - Make the script executable: chmod +x dawei-gui
          - Do not move or delete the resources directory
          - If you encounter issues, check the application logs

          ## Support

          Project Homepage: https://github.com/dawei/patent-agent

          Copyright (c) 2026 Dawei Team. All rights reserved.
          EOF

          # Create ZIP
          cd "webui/src-tauri/target/${{ matrix.target }}/release"
          # Use relative path since we're already in the release directory
          ZIP_DIR_BASE=$(basename "${ZIP_DIR}")
          zip -qr "${ZIP_NAME}" "${ZIP_DIR_BASE}"

          echo "Created ZIP: ${ZIP_NAME}"
          ls -la "${ZIP_NAME}"

      # ========== Upload artifacts ==========
      # Note: macOS artifacts upload both binary and ZIP packages
      - name: Upload artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: dawei-gui-standalone-macos-${{ matrix.arch }}-v${{ steps.version.outputs.version }}
          path: webui/src-tauri/target/${{ matrix.target }}/release/*.zip
          if-no-files-found: error

      - name: Upload artifacts (Linux x86_64)
        if: matrix.platform == 'ubuntu-latest' && matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: dawei-gui-standalone-linux-x86_64-v${{ steps.version.outputs.version }}
          path: webui/src-tauri/target/${{ matrix.target }}/release/*.zip
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: startsWith(matrix.platform, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: dawei-gui-standalone-windows-x86_64-v${{ steps.version.outputs.version }}
          path: |
            webui/src-tauri/target/${{ matrix.target }}/release/*.zip
          if-no-files-found: warn

  # ========== Release to GitHub ==========
  release:
    needs: build
    if: |
      always() && (
        startsWith(github.ref, 'refs/tags/') ||
        (github.event_name == 'workflow_dispatch' && inputs.create_release == true)
      ) && (needs.build.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dawei-gui-standalone-*
          merge-multiple: true
          path: ./bundles

      - name: Display structure of downloaded files
        run: ls -R ./bundles

      - name: Extract artifact zips and reorganize
        run: |
          echo "=== Finding portable ZIP files from extracted artifacts ==="
          mkdir -p ./release-zips

          # Find all portable ZIP files and copy to release-zips
          find ./bundles -type f -name "*portable*.zip" | while read zip_file; do
            echo "Found portable ZIP: $zip_file"
            cp "$zip_file" "./release-zips/$(basename "$zip_file")"
          done

          echo "=== Final release zips ==="
          ls -lh ./release-zips/

          # Verify we found the expected files
          if [ -z "$(find ./release-zips -name '*.zip' -type f)" ]; then
            echo "ERROR: No portable ZIP files found!"
            echo "Bundles structure:"
            find ./bundles -type f -name "*.zip" || echo "No ZIP files found at all"
            exit 1
          fi

      - name: Get version for release
        id: release_version
        run: |
          # Determine version: use input version, tag ref, or Cargo.toml
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            VERSION=${VERSION#v}  # Remove leading 'v' if present
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(grep '^version' webui/src-tauri/Cargo.toml | head -1 | awk -F '"' '{print $2}')
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Creating release for version: ${VERSION}"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.release_version.outputs.version }}"
          TAG="v${VERSION}"

          # Find all real portable ZIP files
          echo "=== Finding all portable ZIP files ==="
          find ./release-zips -name "*.zip" -type f

          # Upload all portable ZIP files to release
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Release $TAG" \
            --notes "## Tauri Standalone Release $TAG

          ### Installation

          #### Portable ZIP Packages (Standalone)
          - **macOS Intel**: \`dawei-gui-standalone-darwin-x86_64-portable-v${TAG#v}.zip\` - For Intel Macs (2019 and earlier)
          - **macOS Apple Silicon**: \`dawei-gui-standalone-darwin-aarch64-portable-v${TAG#v}.zip\` - For M1/M2/M3/M4 Macs
          - **Windows**: \`dawei-gui-standalone-win-portable-v${TAG#v}.zip\` - No installation required
          - **Linux x86_64**: \`dawei-gui-standalone-linux-x86_64-portable-v${TAG#v}.zip\` - For Intel/AMD 64-bit systems

          ### Features

          - Complete Python environment included (FastAPI, uvicorn, and all dependencies)
          - No external Python installation required
          - Standalone operation - works offline
          - Portable ZIP versions require no installation
          - Multi-architecture support (Intel and Apple Silicon for macOS, x86_64 for Linux)
          - **Draw.io diagram editor included** (148 MB) - Create and edit diagrams visually

          ### Quick Start (Portable)

          1. Download the appropriate ZIP file for your platform and architecture
          2. Extract to any folder
          3. Run the application:
             - Windows: Double-click \`dawei-gui.exe\`
             - Linux/macOS: Run \`./dawei-gui\`

          **Note for macOS users**: Check your architecture with \`uname -m\`:
          - \`x86_64\`: Download the x86_64 version (Intel Macs)
          - \`arm64\` or \`aarch64\`: Download the aarch64 version (Apple Silicon Macs)

          **Note for Linux users**: Check your architecture with \`uname -m\`:
          - \`x86_64\`: Download the x86_64 version (Intel/AMD PCs)

          **Why no Universal Binary?** Due to technical limitations with Python C extensions on different architectures, we provide separate builds for Intel and Apple Silicon Macs. This ensures optimal performance and compatibility for both platforms.
          " \
            $(find ./release-zips -name "*.zip" -type f)
