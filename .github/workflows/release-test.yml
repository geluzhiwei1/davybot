name: Release to TestPyPI

# 自动发布到 TestPyPI（推送 tag 时触发）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0). Leave empty to auto-detect from git tag'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-tauri:
    name: Build Tauri (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            arch: 'x86_64'
            os: 'linux'
            exe_name: 'dawei-gui-linux-x86_64'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            arch: 'x86_64'
            os: 'darwin'
            exe_name: 'dawei-gui-darwin-x86_64'
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            arch: 'aarch64'
            os: 'darwin'
            exe_name: 'dawei-gui-darwin-aarch64'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            arch: 'x86_64'
            os: 'windows'
            exe_name: 'dawei-gui-windows-x86_64.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'webui/pnpm-lock.yaml'

      - name: Setup Rust (for Tauri)
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libatk-bridge2.0-dev \
            patchelf \
            p7zip-full

      - name: Install frontend dependencies
        working-directory: ./webui
        run: pnpm install --frozen-lockfile

      - name: Prepare drawio resources
        if: runner.os != 'Windows'
        working-directory: ./webui
        run: |
          # Prepare deps directory and clone drawio
          mkdir -p ../deps
          if [ ! -d "../deps/drawio" ]; then
            echo "Cloning drawio repository..."
            git clone https://github.com/geluzhiwei1/drawio.git ../deps/drawio
          fi
          # Run prepare-drawio.sh to copy resources
          bash scripts/prepare-drawio.sh

      - name: Prepare drawio resources (Windows)
        if: runner.os == 'Windows'
        working-directory: ./webui
        shell: bash
        run: |
          # Prepare deps directory and clone drawio
          mkdir -p ../deps
          if [ ! -d "../deps/drawio" ]; then
            echo "Cloning drawio repository..."
            git clone https://github.com/geluzhiwei1/drawio.git ../deps/drawio
          fi
          # Run prepare-drawio.sh to copy resources
          bash scripts/prepare-drawio.sh

      - name: Build frontend
        working-directory: ./webui
        run: pnpm build

      - name: Build Tauri app
        working-directory: ./webui
        run: pnpm tauri build --no-bundle --target ${{ matrix.target }}

      - name: Upload Tauri executable
        uses: actions/upload-artifact@v4
        with:
          name: tauri-executable-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            webui/src-tauri/target/${{ matrix.target }}/release/dawei-gui
            webui/src-tauri/target/${{ matrix.target }}/release/dawei-gui.exe
          if-no-files-found: error

  build-wheel:
    name: Build & Publish Wheel
    runs-on: ubuntu-latest
    needs: build-tauri

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for setuptools_scm version detection

      - name: Download all Tauri executables
        uses: actions/download-artifact@v4
        with:
          path: tauri-executables
          pattern: tauri-executable-*
          merge-multiple: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        working-directory: ./agent
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install build setuptools_scm

      - name: Copy frontend to agent
        run: |
          mkdir -p agent/dawei/frontend
          rm -rf agent/dawei/frontend/*
          cp -r webui/src-tauri/resources/* agent/dawei/frontend/
          # Ensure welcome.html is included
          if [ -f "webui/src-tauri/resources/welcome.html" ]; then
            cp webui/src-tauri/resources/welcome.html agent/dawei/frontend/
          fi

      - name: Copy Tauri executables to agent
        run: |
          mkdir -p agent/dawei/bin
          # Copy each platform executable directly with its target name
          for artifact in tauri-executables/*/; do
            artifact_name=$(basename "$artifact")
            case "$artifact_name" in
              *linux-x86_64*)
                if [ -f "$artifact/dawei-gui" ]; then
                  cp "$artifact/dawei-gui" agent/dawei/bin/dawei-gui-linux-x86_64
                  chmod +x agent/dawei/bin/dawei-gui-linux-x86_64
                fi
                ;;
              *darwin-x86_64*)
                if [ -f "$artifact/dawei-gui" ]; then
                  cp "$artifact/dawei-gui" agent/dawei/bin/dawei-gui-darwin-x86_64
                  chmod +x agent/dawei/bin/dawei-gui-darwin-x86_64
                fi
                ;;
              *darwin-aarch64*)
                if [ -f "$artifact/dawei-gui" ]; then
                  cp "$artifact/dawei-gui" agent/dawei/bin/dawei-gui-darwin-aarch64
                  chmod +x agent/dawei/bin/dawei-gui-darwin-aarch64
                fi
                ;;
              *windows-x86_64*)
                if [ -f "$artifact/dawei-gui.exe" ]; then
                  cp "$artifact/dawei-gui.exe" agent/dawei/bin/dawei-gui-windows-x86_64.exe
                fi
                ;;
            esac
          done
          ls -la agent/dawei/bin/

      - name: Get version from setuptools_scm
        id: version
        run: |
          # If manual version input is provided, use it directly
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Using manual version: ${VERSION}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "use_manual=true" >> $GITHUB_OUTPUT
          else
            # Auto-detect version from setuptools_scm
            cd agent
            VERSION=$(python3 -c "from setuptools_scm import get_version; print(get_version(root='..', relative_to='pyproject.toml'))")
            echo "Detected version: ${VERSION}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "use_manual=false" >> $GITHUB_OUTPUT

            # Validate version format (should not contain git hash like +g7093f5e57)
            if [[ "$VERSION" =~ \+g[0-9a-f]+ ]]; then
              echo "ERROR: Version contains git hash which is not PyPI compatible: $VERSION"
              echo "The local_scheme = 'no-local-version' setting should prevent this"
              exit 1
            fi
          fi

      - name: Build wheel
        working-directory: ./agent
        run: |
          rm -rf dist/ build/ *.egg-info
          # If manual version is provided, use SETUPTOOLS_SCM_PRETEND_VERSION to override
          if [ "${{ steps.version.outputs.use_manual }}" = "true" ]; then
            export SETUPTOOLS_SCM_PRETEND_VERSION_FOR_DAVYBOT="${{ steps.version.outputs.version }}"
            echo "Building with manual version: ${{ steps.version.outputs.version }}"
          else
            echo "Building with auto-detected version from setuptools_scm"
          fi
          python3 -m build

      - name: Copy wheel to root dist
        run: |
          mkdir -p dist
          cp -r agent/dist/* dist/

      - name: Publish distribution to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
